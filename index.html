<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MirageWhisper · 逆温层与海市蜃楼/绿闪预报</title>
  <meta name="description" content="基于 GFS 分层温度数据识别逆温层，评估未来多天海市蜃楼与绿闪可能性。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>🪞 MirageWhisper</h1>
        <p>GFS 分层温度逆温层监测 · 海市蜃楼 / 绿闪倾向判断</p>
      </div>
      <div class="topbar-actions">
        <span id="status">初始化中…</span>
        <button id="refreshBtn">刷新数据</button>
      </div>
    </header>

    <section class="summary" id="summary"></section>

    <section class="controls">
      <label>
        城市
        <select id="citySelect"></select>
      </label>
      <label>
        关注窗口
        <select id="eventType">
          <option value="daytime">白天（海市蜃楼）</option>
          <option value="sunrise">日出（绿闪）</option>
          <option value="sunset">日落（绿闪）</option>
        </select>
      </label>
    </section>

    <section class="city-panel">
      <h2 id="cityTitle">城市详情</h2>
      <div id="cityMeta" class="city-meta">-</div>
      <div class="profile-block">
        <div class="profile-head">
          <h3>时间-海拔温度剖面</h3>
          <div id="heatmapMeta" class="profile-meta">-</div>
        </div>
        <div id="temperatureHeatmap" class="heatmap-wrap"></div>
      </div>
      <div id="dailyCards" class="daily-cards"></div>
    </section>

    <section class="ranking-panel">
      <h2>城市排行（按今天目标时段）</h2>
      <div id="ranking" class="ranking"></div>
    </section>

    <footer class="footer">
      <div>数据源：Open-Meteo GFS（多气压层温度 + 云量 + 日出日落） + Marine（海温，沿海城市尽量接入）</div>
      <div>说明：白天海市蜃楼重点看低空逆温，绿闪则同时关注日出和日落方向的逆温条件。</div>
    </footer>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
